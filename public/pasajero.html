<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasajero · Taxi-AV</title>
  <link rel="stylesheet" href="estilos.css">
  <!-- Leaflet: librería de mapas (gratuita, con OpenStreetMap) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    /* Estilos propios de esta página */
    #mapa {
      height: 340px;
      border-radius: 12px;
      border: 1px solid var(--borde);
      margin-top: 14px;
    }
    #instruccion-principal {
      margin: 10px 0 18px;
      padding: 10px 12px;
      background: #EAF4F6;
      border-left: 4px solid var(--costa);
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .buscador { display: flex; gap: 8px; align-items: flex-end; }
    .buscador > div { flex: 1; }
    .buscador button { margin-top: 0; padding: 11px 14px; white-space: nowrap; }
    .boton-ubicacion {
      margin-top: 8px !important;
      padding: 8px 12px !important;
      font-size: 0.85rem !important;
    }
    .resultados { list-style: none; margin: 6px 0 0; padding: 0; border: 1px solid var(--borde); border-radius: 8px; overflow: hidden; }
    .resultados li { padding: 10px 12px; font-size: 0.9rem; cursor: pointer; background: #fff; border-bottom: 1px solid var(--borde); }
    .resultados li:last-child { border-bottom: none; }
    .resultados li:hover { background: #EAF4F6; }
    #resumen-viaje { margin-top: 12px; font-size: 1rem; line-height: 1.7; }
    #resumen-viaje strong { color: var(--atlantico); }
    #boton-confirmar, #boton-pedir { width: 100%; font-size: 1.05rem; }
    .nota-precio { font-size: 0.82rem; color: #5a6c79; }
  </style>
</head>
<body>
  <header class="app">
    <div class="marca"><span class="luminoso"></span> TAXI-AV · Pasajero</div>
    <a href="index.html">Inicio</a>
  </header>

  <main>
    <!-- ===== Zona de acceso (login / registro) ===== -->
    <section id="zona-acceso">
      <h1>Bienvenido</h1>
      <p class="sub">Inicia sesión o crea tu cuenta para pedir un taxi.</p>

      <div class="tarjeta" style="max-width:480px">
        <div class="pestanas">
          <button id="pestana-login" class="activa" onclick="mostrarPestana('login')">Iniciar sesión</button>
          <button id="pestana-registro" onclick="mostrarPestana('registro')">Crear cuenta</button>
        </div>

        <!-- Login -->
        <div id="formulario-login">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email">
          <label for="login-password">Contraseña</label>
          <input id="login-password" type="password" autocomplete="current-password">
          <button onclick="iniciarSesion()">Entrar</button>
        </div>

        <!-- Registro -->
        <div id="formulario-registro" class="oculto">
          <label for="registro-nombre">Nombre completo</label>
          <input id="registro-nombre" type="text" autocomplete="name">
          <label for="registro-email">Email</label>
          <input id="registro-email" type="email" autocomplete="email">
          <label for="registro-telefono">Teléfono</label>
          <input id="registro-telefono" type="tel" autocomplete="tel">
          <label for="registro-password">Contraseña (mínimo 6 caracteres)</label>
          <input id="registro-password" type="password" autocomplete="new-password">
          <button onclick="registrarse()">Crear cuenta</button>
        </div>

        <div id="mensaje" class="mensaje"></div>
      </div>
    </section>

    <!-- ===== Panel del pasajero (tras iniciar sesión) ===== -->
    <section id="zona-panel" class="oculto">
      <h1 id="saludo">Hola</h1>

      <!-- ÚNICO texto de instrucciones de toda la pantalla (se va actualizando) -->
      <div id="instruccion-principal">📍 Indica tu dirección de <strong>RECOGIDA</strong>: escríbela y pulsa Buscar, usa tu ubicación, o toca el mapa.</div>

      <div class="tarjeta" id="tarjeta-pedir">
        <h2 style="margin-top:0">Pedir un taxi</h2>

        <!-- ORIGEN: campo + buscar, y justo debajo el botón de ubicación -->
        <div class="buscador">
          <div>
            <label for="direccion-origen">📍 Dirección de recogida</label>
            <input id="direccion-origen" type="text" placeholder="Ej.: Calle Triana 25, Las Palmas">
          </div>
          <button class="secundario" onclick="buscarDireccion('origen')">Buscar</button>
        </div>
        <button class="secundario boton-ubicacion" onclick="usarMiUbicacion()">📡 Usar mi ubicación como recogida</button>
        <ul id="resultados-origen" class="resultados oculto"></ul>

        <!-- DESTINO: misma lógica -->
        <div class="buscador" style="margin-top:14px">
          <div>
            <label for="direccion-destino">🏁 Dirección de destino</label>
            <input id="direccion-destino" type="text" placeholder="Ej.: Aeropuerto de Gran Canaria">
          </div>
          <button class="secundario" onclick="buscarDireccion('destino')">Buscar</button>
        </div>
        <ul id="resultados-destino" class="resultados oculto"></ul>

        <!-- MAPA con la ruta -->
        <div id="mapa"></div>
        <button class="secundario boton-ubicacion" onclick="reiniciarSeleccion()">🔄 Empezar de nuevo</button>

        <!-- Resumen: recorrido, tiempo y precio inicial -->
        <div id="resumen-viaje"></div>

        <button id="boton-confirmar" class="oculto" onclick="confirmarPuntos()">✅ Confirmar recogida y destino</button>
        <button id="boton-pedir" class="oculto" onclick="pedirTaxi()">🚖 Pedir taxi ahora</button>
      </div>

      <!-- ===== Viaje en marcha (sustituye al formulario cuando hay un viaje activo) ===== -->
      <div class="tarjeta oculto" id="tarjeta-viaje">
        <h2 style="margin-top:0">Tu viaje</h2>
        <div id="estado-viaje" style="padding:12px;background:#FDF3DC;border-radius:8px;font-size:1rem"></div>
        <div id="detalle-viaje" style="margin-top:12px;font-size:0.95rem"></div>
        <button class="peligro" onclick="cancelarViaje()" id="boton-cancelar">Cancelar viaje</button>
      </div>

      <button class="secundario" onclick="cerrarSesion()">Cerrar sesión</button>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    // ============================================================
    // PARTE 1 · ACCESO (login / registro) — sin cambios de la Fase 1
    // ============================================================
    function mostrarMensaje(texto, tipo) {
      const m = document.getElementById('mensaje');
      m.textContent = texto;
      m.className = 'mensaje ' + tipo;
    }

    function mostrarPestana(cual) {
      document.getElementById('pestana-login').classList.toggle('activa', cual === 'login');
      document.getElementById('pestana-registro').classList.toggle('activa', cual === 'registro');
      document.getElementById('formulario-login').classList.toggle('oculto', cual !== 'login');
      document.getElementById('formulario-registro').classList.toggle('oculto', cual !== 'registro');
      document.getElementById('mensaje').className = 'mensaje';
    }

    function mostrarPanel(nombre) {
      document.getElementById('zona-acceso').classList.add('oculto');
      document.getElementById('zona-panel').classList.remove('oculto');
      document.getElementById('saludo').textContent = 'Hola, ' + nombre;
      comprobarViajeActivo();
    }

    async function registrarse() {
      const datos = {
        nombre: document.getElementById('registro-nombre').value,
        email: document.getElementById('registro-email').value,
        telefono: document.getElementById('registro-telefono').value,
        password: document.getElementById('registro-password').value
      };
      const r = await fetch('/api/pasajero/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      const respuesta = await r.json();
      if (respuesta.ok) mostrarPanel(respuesta.usuario.nombre);
      else mostrarMensaje(respuesta.error, 'error');
    }

    async function iniciarSesion() {
      const datos = {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      };
      const r = await fetch('/api/pasajero/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      const respuesta = await r.json();
      if (respuesta.ok) mostrarPanel(respuesta.usuario.nombre);
      else mostrarMensaje(respuesta.error, 'error');
    }

    async function cerrarSesion() {
      await fetch('/api/logout', { method: 'POST' });
      location.reload();
    }

    (async function () {
      const r = await fetch('/api/sesion');
      const s = await r.json();
      if (s.rol === 'pasajero') {
        const yo = await (await fetch('/api/pasajero/me')).json();
        mostrarPanel(yo.usuario.nombre);
      }
    })();

    // ============================================================
    // PARTE 2 · EL MAPA Y LA RUTA — con recorrido real, tiempo y precio
    // ============================================================
    let mapa = null;
    let marcadorOrigen = null;
    let marcadorDestino = null;
    let lineaRuta = null;            // el dibujo del recorrido en el mapa
    let rutaActual = null;           // { km, min } de la ruta calculada
    let direccionOrigen = '';
    let direccionDestino = '';
    let confirmado = false;

    const LIMITES_CANARIAS = [[27.2, -18.6], [29.6, -13.0]];
    const CENTRO_GRAN_CANARIA = [27.96, -15.59];

    // TARIFA PROVISIONAL (orientativa, ajustable en el futuro desde el panel)
    const TARIFA = { base: 3.00, porKm: 0.70, porMin: 0.10 };

    function instruccion(html) {
      document.getElementById('instruccion-principal').innerHTML = html;
    }

    function iniciarMapa() {
      if (mapa) return;
      mapa = L.map('mapa', {
        center: CENTRO_GRAN_CANARIA,
        zoom: 10,
        maxBounds: LIMITES_CANARIAS,
        minZoom: 8
      });
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
      }).addTo(mapa);

      mapa.on('click', function (e) {
        if (confirmado) return;
        if (!marcadorOrigen) ponerMarcador('origen', e.latlng.lat, e.latlng.lng, 'Punto marcado en el mapa');
        else if (!marcadorDestino) ponerMarcador('destino', e.latlng.lat, e.latlng.lng, 'Punto marcado en el mapa');
      });

      setTimeout(() => mapa.invalidateSize(), 200);
    }

    function ponerMarcador(cual, lat, lng, direccion) {
      const esOrigen = (cual === 'origen');
      let marcador = esOrigen ? marcadorOrigen : marcadorDestino;

      if (marcador) {
        marcador.setLatLng([lat, lng]);
      } else {
        marcador = L.marker([lat, lng], { draggable: true });
        marcador.addTo(mapa);
        marcador.on('dragend', function () {
          actualizarEstado();
        });
        if (esOrigen) marcadorOrigen = marcador; else marcadorDestino = marcador;
      }

      marcador.bindPopup(esOrigen ? '📍 Recogida (arrástrame para ajustar)' : '🏁 Destino (arrástrame para ajustar)').openPopup();
      if (esOrigen) direccionOrigen = direccion; else direccionDestino = direccion;
      actualizarEstado();
    }

    async function buscarDireccion(cual) {
      if (confirmado) return;
      const texto = document.getElementById('direccion-' + cual).value.trim();
      const lista = document.getElementById('resultados-' + cual);
      if (texto.length < 3) {
        lista.classList.add('oculto');
        alert('Escribe al menos 3 letras de la dirección.');
        return;
      }
      lista.innerHTML = '<li>Buscando…</li>';
      lista.classList.remove('oculto');

      try {
        const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=5&accept-language=es' +
          '&countrycodes=es&viewbox=-18.6,29.6,-13.0,27.2&bounded=1&q=' + encodeURIComponent(texto);
        const r = await fetch(url);
        const resultados = await r.json();

        if (!resultados.length) {
          lista.innerHTML = '<li>Sin resultados en Canarias. Prueba añadiendo el municipio (ej.: ", Las Palmas").</li>';
          return;
        }

        lista.innerHTML = '';
        resultados.forEach(function (lugar) {
          const li = document.createElement('li');
          li.textContent = lugar.display_name;
          li.onclick = function () {
            ponerMarcador(cual, parseFloat(lugar.lat), parseFloat(lugar.lon), lugar.display_name);
            document.getElementById('direccion-' + cual).value = lugar.display_name.split(',').slice(0, 2).join(',');
            lista.classList.add('oculto');
          };
          lista.appendChild(li);
        });
      } catch (e) {
        lista.innerHTML = '<li>Error al buscar. Inténtalo de nuevo en unos segundos.</li>';
      }
    }

    function usarMiUbicacion() {
      if (confirmado) return;
      if (!navigator.geolocation) {
        alert('Tu navegador no permite obtener la ubicación.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        function (posicion) {
          ponerMarcador('origen', posicion.coords.latitude, posicion.coords.longitude, 'Mi ubicación actual');
          document.getElementById('direccion-origen').value = 'Mi ubicación actual';
          if (!marcadorDestino) mapa.setView([posicion.coords.latitude, posicion.coords.longitude], 16);
        },
        function () {
          alert('No se pudo obtener tu ubicación. Comprueba que diste permiso al navegador y que el GPS está activado.');
        }
      );
    }

    function reiniciarSeleccion() {
      if (marcadorOrigen) { mapa.removeLayer(marcadorOrigen); marcadorOrigen = null; }
      if (marcadorDestino) { mapa.removeLayer(marcadorDestino); marcadorDestino = null; }
      if (lineaRuta) { mapa.removeLayer(lineaRuta); lineaRuta = null; }
      rutaActual = null;
      direccionOrigen = '';
      direccionDestino = '';
      confirmado = false;
      document.getElementById('direccion-origen').value = '';
      document.getElementById('direccion-destino').value = '';
      document.getElementById('direccion-origen').disabled = false;
      document.getElementById('direccion-destino').disabled = false;
      document.getElementById('resultados-origen').classList.add('oculto');
      document.getElementById('resultados-destino').classList.add('oculto');
      document.getElementById('resumen-viaje').innerHTML = '';
      document.getElementById('boton-confirmar').classList.add('oculto');
      document.getElementById('boton-pedir').classList.add('oculto');
      instruccion('📍 Indica tu dirección de <strong>RECOGIDA</strong>: escríbela y pulsa Buscar, usa tu ubicación, o toca el mapa.');
    }

    function distanciaKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function precioEstimado(km, min) {
      return TARIFA.base + km * TARIFA.porKm + min * TARIFA.porMin;
    }

    // Calcula la ruta REAL por carretera con OSRM (gratuito, OpenStreetMap)
    async function calcularRuta() {
      const o = marcadorOrigen.getLatLng();
      const d = marcadorDestino.getLatLng();
      document.getElementById('resumen-viaje').innerHTML = '🛣️ Calculando recorrido…';

      try {
        const url = 'https://router.project-osrm.org/route/v1/driving/' +
          o.lng + ',' + o.lat + ';' + d.lng + ',' + d.lat + '?overview=full&geometries=geojson';
        const r = await fetch(url);
        const datos = await r.json();
        if (!datos.routes || !datos.routes.length) throw new Error('sin ruta');

        const ruta = datos.routes[0];
        rutaActual = { km: ruta.distance / 1000, min: ruta.duration / 60 };

        if (lineaRuta) mapa.removeLayer(lineaRuta);
        lineaRuta = L.geoJSON(ruta.geometry, {
          style: { color: '#10808F', weight: 5, opacity: 0.85 }
        }).addTo(mapa);
        mapa.fitBounds(lineaRuta.getBounds(), { padding: [30, 30] });
      } catch (e) {
        // Si el servicio de rutas falla, usamos la línea recta como respaldo
        rutaActual = { km: distanciaKm(o.lat, o.lng, d.lat, d.lng), min: null };
        if (lineaRuta) { mapa.removeLayer(lineaRuta); lineaRuta = null; }
      }
      pintarResumen();
    }

    function pintarResumen() {
      if (!rutaActual) return;
      const km = rutaActual.km;
      const min = rutaActual.min;
      const precio = precioEstimado(km, min || 0);
      let html = '🛣️ Recorrido: <strong>' + km.toFixed(1) + ' km</strong>';
      if (min !== null) html += ' · ⏱️ Tiempo estimado: <strong>' + Math.round(min) + ' min</strong>';
      html += ' · 💶 Precio inicial: <strong>~' + precio.toFixed(2) + ' €</strong>';
      html += '<br><span class="nota-precio">Precio orientativo según las condiciones actuales; el importe final puede variar.</span>';
      document.getElementById('resumen-viaje').innerHTML = html;
    }

    function actualizarEstado() {
      if (marcadorOrigen && !marcadorDestino) {
        instruccion('🏁 Recogida puesta. Ahora indica el <strong>DESTINO</strong>: escríbelo y pulsa Buscar, o toca el mapa. Puedes arrastrar el marcador para ajustarlo.');
        document.getElementById('resumen-viaje').innerHTML = '';
        document.getElementById('boton-confirmar').classList.add('oculto');
      } else if (marcadorOrigen && marcadorDestino) {
        instruccion('✏️ Revisa el recorrido: puedes <strong>arrastrar los marcadores</strong> para afinar. Cuando esté bien, pulsa Confirmar.');
        document.getElementById('boton-confirmar').classList.remove('oculto');
        calcularRuta();
      }
    }

    function confirmarPuntos() {
      confirmado = true;
      marcadorOrigen.dragging.disable();
      marcadorDestino.dragging.disable();
      marcadorOrigen.closePopup();
      marcadorDestino.closePopup();
      document.getElementById('direccion-origen').disabled = true;
      document.getElementById('direccion-destino').disabled = true;
      document.getElementById('boton-confirmar').classList.add('oculto');
      instruccion('✅ Recogida y destino confirmados. Si quieres cambiarlos, pulsa "Empezar de nuevo".');
      document.getElementById('boton-pedir').classList.remove('oculto');
    }

    // ============================================================
    // PARTE 3 · PEDIR EL TAXI — el viaje se guarda en la base de datos
    // ============================================================
    const TEXTOS_ESTADO_VIAJE = {
      solicitado: '🔎 Buscando un conductor disponible…',
      asignado: '🚖 ¡Conductor asignado! Está en camino.',
      en_curso: '🛣️ Viaje en curso. ¡Buen camino!'
    };

    async function pedirTaxi() {
      const o = marcadorOrigen.getLatLng();
      const d = marcadorDestino.getLatLng();
      const datos = {
        origen_lat: o.lat,
        origen_lng: o.lng,
        origen_direccion: direccionOrigen,
        destino_lat: d.lat,
        destino_lng: d.lng,
        destino_direccion: direccionDestino
      };
      const r = await fetch('/api/pasajero/viaje', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      const respuesta = await r.json();
      if (respuesta.ok) mostrarViaje(respuesta.viaje);
      else alert(respuesta.error);
    }

    let sondeoViaje = null;

    function mostrarViaje(viaje) {
      document.getElementById('tarjeta-pedir').classList.add('oculto');
      document.getElementById('tarjeta-viaje').classList.remove('oculto');
      instruccion('🚕 Tienes un viaje en marcha. Esta pantalla se actualiza sola.');
      document.getElementById('estado-viaje').textContent =
        TEXTOS_ESTADO_VIAJE[viaje.estado] || viaje.estado;

      let detalle =
        '<strong>Recogida:</strong> ' + (viaje.origen_direccion || 'punto marcado en el mapa') + '<br>' +
        '<strong>Destino:</strong> ' + (viaje.destino_direccion || 'punto marcado en el mapa') + '<br>' +
        '<strong>Distancia:</strong> ' + parseFloat(viaje.distancia_km).toFixed(1) + ' km (línea recta, aprox.)';

      // Si ya hay conductor asignado, mostramos sus datos y los del vehículo
      if (viaje.conductor_nombre) {
        detalle += '<br><br><strong>🚖 Tu conductor:</strong> ' + viaje.conductor_nombre +
          '<br><strong>Vehículo:</strong> ' + (viaje.vehiculo_marca || '') + ' ' + (viaje.vehiculo_modelo || '') +
          ' · Matrícula <strong>' + (viaje.matricula || '—') + '</strong>';
      }
      document.getElementById('detalle-viaje').innerHTML = detalle;
      document.getElementById('boton-cancelar').dataset.viajeId = viaje.id;
      // Una vez el viaje está en curso, ya no se puede cancelar desde la app
      document.getElementById('boton-cancelar').classList.toggle('oculto', viaje.estado === 'en_curso');

      // Sondeo: consultar el estado cada 6 segundos
      if (!sondeoViaje) sondeoViaje = setInterval(actualizarViaje, 6000);
    }

    async function actualizarViaje() {
      const r = await fetch('/api/pasajero/viaje-actual');
      const { viaje } = await r.json();
      if (viaje) {
        mostrarViaje(viaje);
      } else {
        // El viaje terminó (o fue finalizado por el conductor): volver al inicio
        clearInterval(sondeoViaje);
        sondeoViaje = null;
        alert('Tu viaje ha terminado. ¡Gracias por viajar con nosotros! 🚖');
        location.reload();
      }
    }

    async function cancelarViaje() {
      const id = document.getElementById('boton-cancelar').dataset.viajeId;
      if (!confirm('¿Seguro que quieres cancelar este viaje?')) return;
      const r = await fetch('/api/pasajero/viaje/' + id + '/cancelar', { method: 'POST' });
      const respuesta = await r.json();
      if (respuesta.ok) location.reload();
      else alert(respuesta.error);
    }

    async function comprobarViajeActivo() {
      const r = await fetch('/api/pasajero/viaje-actual');
      const { viaje } = await r.json();
      if (viaje) {
        mostrarViaje(viaje);
      } else {
        document.getElementById('tarjeta-pedir').classList.remove('oculto');
        document.getElementById('tarjeta-viaje').classList.add('oculto');
        iniciarMapa();
      }
    }
  </script>
</body>
</html>
