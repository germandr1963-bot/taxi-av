<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conductor · Taxi-AV</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <header class="app">
    <div class="marca"><span class="luminoso"></span> TAXI-AV · Conductor</div>
    <a href="index.html">Inicio</a>
  </header>

  <main>
    <!-- ===== Zona de acceso ===== -->
    <section id="zona-acceso">
      <h1>Área de conductores</h1>
      <p class="sub">Regístrate con tu vehículo. Tu cuenta será revisada y aprobada por la administración antes de poder recibir viajes.</p>

      <div class="tarjeta" style="max-width:520px">
        <div class="pestanas">
          <button id="pestana-login" class="activa" onclick="mostrarPestana('login')">Iniciar sesión</button>
          <button id="pestana-registro" onclick="mostrarPestana('registro')">Registrarme</button>
        </div>

        <!-- Login -->
        <div id="formulario-login">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email">
          <label for="login-password">Contraseña</label>
          <input id="login-password" type="password" autocomplete="current-password">
          <button onclick="iniciarSesion()">Entrar</button>
        </div>

        <!-- Registro -->
        <div id="formulario-registro" class="oculto">
          <label for="registro-nombre">Nombre completo</label>
          <input id="registro-nombre" type="text" autocomplete="name">
          <label for="registro-email">Email</label>
          <input id="registro-email" type="email" autocomplete="email">
          <label for="registro-telefono">Teléfono</label>
          <input id="registro-telefono" type="tel" autocomplete="tel">
          <label for="registro-password">Contraseña (mínimo 6 caracteres)</label>
          <input id="registro-password" type="password" autocomplete="new-password">

          <h2>Tu vehículo</h2>
          <label for="registro-marca">Marca</label>
          <input id="registro-marca" type="text" placeholder="Toyota">
          <label for="registro-modelo">Modelo</label>
          <input id="registro-modelo" type="text" placeholder="Prius">
          <label for="registro-matricula">Matrícula</label>
          <input id="registro-matricula" type="text" placeholder="0000 ABC">
          <label for="registro-plazas">Plazas para pasajeros</label>
          <select id="registro-plazas">
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
          <label for="registro-isla">Isla donde operas</label>
          <select id="registro-isla">
            <option selected>Gran Canaria</option>
            <option>Tenerife</option>
            <option>Lanzarote</option>
            <option>Fuerteventura</option>
            <option>La Palma</option>
            <option>La Gomera</option>
            <option>El Hierro</option>
            <option>La Graciosa</option>
          </select>
          <button onclick="registrarse()">Enviar solicitud</button>
        </div>

        <div id="mensaje" class="mensaje"></div>
      </div>
    </section>

    <!-- ===== Panel del conductor ===== -->
    <section id="zona-panel" class="oculto">
      <h1 id="saludo">Hola</h1>
      <p class="sub" id="texto-estado"></p>

      <div class="tarjeta" id="ficha-vehiculo"></div>

      <!-- Panel de trabajo (solo para conductores aprobados) -->
      <div class="tarjeta oculto" id="tarjeta-trabajo">
        <h2 style="margin-top:0">Recibir viajes</h2>
        <button id="boton-disponible" onclick="alternarDisponible()">▶️ Ponerme DISPONIBLE</button>
        <div id="zona-solicitudes" class="oculto">
          <h2>Solicitudes pendientes</h2>
          <div id="lista-solicitudes" style="font-size:0.95rem">Cargando…</div>
        </div>
      </div>

      <!-- Viaje activo del conductor -->
      <div class="tarjeta oculto" id="tarjeta-viaje-conductor">
        <h2 style="margin-top:0">Tu viaje en marcha</h2>
        <div id="detalle-viaje-conductor" style="font-size:0.95rem;line-height:1.7"></div>
        <button id="boton-iniciar" onclick="iniciarViaje()">🚖 He recogido al pasajero (iniciar viaje)</button>
        <button id="boton-finalizar" class="oculto" onclick="finalizarViaje()">🏁 Viaje terminado</button>
      </div>

      <button class="secundario" onclick="cerrarSesion()">Cerrar sesión</button>
    </section>
  </main>

  <script>
    function mostrarMensaje(texto, tipo) {
      const m = document.getElementById('mensaje');
      m.textContent = texto;
      m.className = 'mensaje ' + tipo;
    }

    function mostrarPestana(cual) {
      document.getElementById('pestana-login').classList.toggle('activa', cual === 'login');
      document.getElementById('pestana-registro').classList.toggle('activa', cual === 'registro');
      document.getElementById('formulario-login').classList.toggle('oculto', cual !== 'login');
      document.getElementById('formulario-registro').classList.toggle('oculto', cual !== 'registro');
      document.getElementById('mensaje').className = 'mensaje';
    }

    const TEXTOS_ESTADO = {
      pendiente: 'Tu solicitud está en revisión. Te avisaremos cuando la administración apruebe tu cuenta.',
      aprobado: 'Tu cuenta está aprobada. Ya formas parte de la plataforma.',
      suspendido: 'Tu cuenta está suspendida. Contacta con la administración.'
    };

    async function mostrarPanel() {
      const r = await fetch('/api/conductor/me');
      if (!r.ok) return;
      const { conductor } = await r.json();
      document.getElementById('zona-acceso').classList.add('oculto');
      document.getElementById('zona-panel').classList.remove('oculto');
      document.getElementById('saludo').textContent = 'Hola, ' + conductor.nombre;
      document.getElementById('texto-estado').innerHTML =
        '<span class="etiqueta ' + conductor.estado + '">' + conductor.estado.toUpperCase() + '</span> ' +
        TEXTOS_ESTADO[conductor.estado];
      document.getElementById('ficha-vehiculo').innerHTML =
        '<h2 style="margin-top:0">Tu vehículo</h2>' +
        '<p><strong>' + (conductor.vehiculo_marca || '—') + ' ' + (conductor.vehiculo_modelo || '') + '</strong><br>' +
        'Matrícula: ' + (conductor.matricula || '—') + ' · Plazas: ' + conductor.plazas + '<br>' +
        'Isla: ' + conductor.isla + '</p>';

      // El panel de trabajo solo se activa para conductores aprobados
      if (conductor.estado === 'aprobado') {
        document.getElementById('tarjeta-trabajo').classList.remove('oculto');
        disponible = conductor.disponible;
        pintarBotonDisponible();
        refrescarTrabajo();
        if (!sondeo) sondeo = setInterval(refrescarTrabajo, 7000); // se actualiza solo cada 7 segundos
      }
    }

    // ============================================================
    // TRABAJO DEL CONDUCTOR — Fase 2, Entrega 3
    // ============================================================
    let disponible = false;
    let sondeo = null;
    let viajeActivo = null;

    function pintarBotonDisponible() {
      const boton = document.getElementById('boton-disponible');
      if (disponible) {
        boton.textContent = '⏸️ Dejar de estar disponible';
        boton.className = 'peligro';
        document.getElementById('zona-solicitudes').classList.remove('oculto');
      } else {
        boton.textContent = '▶️ Ponerme DISPONIBLE';
        boton.className = '';
        document.getElementById('zona-solicitudes').classList.add('oculto');
      }
    }

    async function alternarDisponible() {
      const r = await fetch('/api/conductor/disponible', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ disponible: !disponible })
      });
      const respuesta = await r.json();
      if (respuesta.ok) {
        disponible = respuesta.disponible;
        pintarBotonDisponible();
        refrescarTrabajo();
      } else {
        alert(respuesta.error);
      }
    }

    // Cada 7 segundos: ¿tengo un viaje en marcha? Si no, ¿hay solicitudes nuevas?
    async function refrescarTrabajo() {
      const r = await fetch('/api/conductor/viaje-actual');
      const { viaje } = await r.json();
      viajeActivo = viaje;

      if (viaje) {
        document.getElementById('tarjeta-trabajo').classList.add('oculto');
        document.getElementById('tarjeta-viaje-conductor').classList.remove('oculto');
        document.getElementById('detalle-viaje-conductor').innerHTML =
          '<strong>Pasajero:</strong> ' + viaje.pasajero_nombre + '<br>' +
          '<strong>Recogida:</strong> ' + (viaje.origen_direccion || 'punto marcado en el mapa') + '<br>' +
          '<strong>Destino:</strong> ' + (viaje.destino_direccion || 'punto marcado en el mapa') + '<br>' +
          '<strong>Distancia:</strong> ' + parseFloat(viaje.distancia_km).toFixed(1) + ' km (línea recta, aprox.)';
        document.getElementById('boton-iniciar').classList.toggle('oculto', viaje.estado !== 'asignado');
        document.getElementById('boton-finalizar').classList.toggle('oculto', viaje.estado !== 'en_curso');
      } else {
        document.getElementById('tarjeta-viaje-conductor').classList.add('oculto');
        document.getElementById('tarjeta-trabajo').classList.remove('oculto');
        if (disponible) cargarSolicitudes();
      }
    }

    async function cargarSolicitudes() {
      const r = await fetch('/api/conductor/solicitudes');
      if (!r.ok) return;
      const { solicitudes } = await r.json();
      const zona = document.getElementById('lista-solicitudes');
      if (solicitudes.length === 0) {
        zona.innerHTML = 'No hay solicitudes pendientes ahora mismo. Esta lista se actualiza sola.';
        return;
      }
      zona.innerHTML = solicitudes.map(s =>
        '<div style="border:1px solid var(--borde);border-radius:8px;padding:12px;margin-bottom:10px">' +
        '<strong>' + s.pasajero_nombre + '</strong> · ' + parseFloat(s.distancia_km).toFixed(1) + ' km<br>' +
        '📍 ' + (s.origen_direccion || 'punto en el mapa') + '<br>' +
        '🏁 ' + (s.destino_direccion || 'punto en el mapa') + '<br>' +
        '<button style="margin-top:8px;padding:8px 16px" onclick="aceptarViaje(' + s.id + ')">✅ Aceptar este viaje</button>' +
        '</div>'
      ).join('');
    }

    async function aceptarViaje(id) {
      const r = await fetch('/api/conductor/viaje/' + id + '/aceptar', { method: 'POST' });
      const respuesta = await r.json();
      if (respuesta.ok) refrescarTrabajo();
      else { alert(respuesta.error); cargarSolicitudes(); }
    }

    async function iniciarViaje() {
      if (!viajeActivo) return;
      const r = await fetch('/api/conductor/viaje/' + viajeActivo.id + '/iniciar', { method: 'POST' });
      const respuesta = await r.json();
      if (respuesta.ok) refrescarTrabajo();
      else alert(respuesta.error);
    }

    async function finalizarViaje() {
      if (!viajeActivo) return;
      const r = await fetch('/api/conductor/viaje/' + viajeActivo.id + '/finalizar', { method: 'POST' });
      const respuesta = await r.json();
      if (respuesta.ok) {
        alert('¡Viaje completado! Buen trabajo. 🏁');
        refrescarTrabajo();
      } else {
        alert(respuesta.error);
      }
    }

    async function registrarse() {
      const datos = {
        nombre: document.getElementById('registro-nombre').value,
        email: document.getElementById('registro-email').value,
        telefono: document.getElementById('registro-telefono').value,
        password: document.getElementById('registro-password').value,
        vehiculo_marca: document.getElementById('registro-marca').value,
        vehiculo_modelo: document.getElementById('registro-modelo').value,
        matricula: document.getElementById('registro-matricula').value,
        plazas: document.getElementById('registro-plazas').value,
        isla: document.getElementById('registro-isla').value
      };
      const r = await fetch('/api/conductor/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      const respuesta = await r.json();
      if (respuesta.ok) mostrarPanel();
      else mostrarMensaje(respuesta.error, 'error');
    }

    async function iniciarSesion() {
      const datos = {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      };
      const r = await fetch('/api/conductor/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      const respuesta = await r.json();
      if (respuesta.ok) mostrarPanel();
      else mostrarMensaje(respuesta.error, 'error');
    }

    async function cerrarSesion() {
      await fetch('/api/logout', { method: 'POST' });
      location.reload();
    }

    (async function () {
      const r = await fetch('/api/sesion');
      const s = await r.json();
      if (s.rol === 'conductor') mostrarPanel();
    })();
  </script>
</body>
</html>
