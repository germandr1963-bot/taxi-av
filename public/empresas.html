<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empresas · Taxi - Guanche</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <header class="app">
    <div style="display:flex;align-items:center;gap:10px"><img src="logo-simbolo.png" alt="Taxi - Guanche" class="logo-simbolo"><span style="font-weight:700">EMPRESAS</span></div>
    <a href="pasajero.html">Volver</a>
  </header>
  <main>
    <h1>Tu empresa, con Taxi - Guanche</h1>
    <p class="sub">Solicita tu alta en la plataforma y disfruta de beneficios exclusivos para tu empresa, con un acceso ágil, seguro y disponible en línea.</p>
    <div class="tarjeta" style="max-width:520px">
      <label>Nombre de la empresa o establecimiento</label><input type="text">
      <label>NIF</label><input type="text">
      <label>Dirección</label><input type="text">
      <label>Código postal</label><input type="text">
      <label>Municipio</label><input type="text">
      <label>Email</label><input type="email">
      <label>Teléfono</label><input type="tel">
      <label>Tu mensaje</label><input type="text">
      <button onclick="alert('El envío de solicitudes estará disponible muy pronto. ¡Gracias por tu interés!')">Enviar solicitud</button>
      <p style="font-size:0.82rem;color:#5a6c79;margin-top:10px">Al enviar aceptarás nuestra <a href="privacidad.html">Política de privacidad</a>.</p>
    </div>
  </main>
</body>
</html>
